<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogos | Kauã</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;1,900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Montserrat', sans-serif;
        background-color: #050a10;
        background-image: radial-gradient(circle at top, #001f3f 0%, #050a10 70%);
        color: #ffffff;
        min-height: 100vh;
        padding: 40px 20px;
        background-attachment: fixed;
    }

    .header {
        text-align: center;
        margin-bottom: 40px;
    }

    .header h1 {
        font-size: 32px;
        font-weight: 900;
        text-transform: uppercase;
        color: #00d4ff;
        text-shadow: 0px 0px 15px rgba(0, 123, 255, 0.6);
    }

    /* LAYOUT TELA DIVIDIDA */
    .layout-elite {
        display: flex;
        gap: 30px;
        max-width: 1000px;
        margin: 0 auto;
        align-items: flex-start;
    }

    /* LADO ESQUERDO: Menu */
    .menu-lateral {
        flex: 1;
        min-width: 250px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .btn-jogo {
        background: rgba(10, 20, 35, 0.8);
        border: 1px solid #004080;
        color: #ffffff;
        padding: 15px;
        border-radius: 12px;
        font-family: 'Montserrat', sans-serif;
        font-weight: bold;
        text-align: left;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        font-size: 14px;
    }

    .btn-jogo:hover {
        border-color: #00d4ff;
        background: rgba(0, 123, 255, 0.1);
        transform: translateX(5px);
    }

    .btn-jogo.ativo {
        background: linear-gradient(90deg, #004e92, #00d4ff);
        border-color: #00d4ff;
        box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        transform: translateX(10px);
    }

    /* LADO DIREITO: Detalhes */
    .painel-detalhes {
        flex: 2;
        background: rgba(10, 20, 35, 0.9);
        border: 1px solid #007bff;
        border-radius: 20px;
        padding: 25px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(10px);
        animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .detalhe-img {
        width: 100%;
        height: 280px;
        border-radius: 15px;
        object-fit: cover;
        margin-bottom: 20px;
        border: 2px solid #004080;
    }

    .detalhe-titulo {
        font-size: 26px;
        font-weight: 900;
        margin-bottom: 10px;
        color: #fff;
    }

    .detalhe-info {
        font-size: 14px;
        color: #a0c4ff;
        margin-bottom: 20px;
        line-height: 1.6;
    }

    .btn-entrar {
        display: block;
        background: #00d4ff;
        color: #050a10;
        text-align: center;
        text-decoration: none;
        padding: 15px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 900;
        text-transform: uppercase;
        transition: 0.3s;
    }

    .btn-entrar:hover {
        background: #fff;
        box-shadow: 0 0 20px #00d4ff;
    }

    .btn-voltar {
        display: inline-block;
        margin-top: 40px;
        color: #00d4ff;
        text-decoration: none;
        font-weight: bold;
        padding: 10px 20px;
        border: 1px solid #00d4ff;
        border-radius: 8px;
        transition: 0.3s;
    }

    .btn-voltar:hover { background: rgba(0, 212, 255, 0.1); }

    @media (max-width: 768px) {
        .layout-elite { flex-direction: column; }
        .detalhe-img { height: 200px; }
    }
</style>
</head>
<body>

    <div class="header">
        <h1>🕹️ Meus Jogos</h1>
    </div>

    <div class="layout-elite">
        <div class="menu-lateral" id="menuJogos"></div>

        <div class="painel-detalhes" id="painelDetalhes"></div>
    </div>

    <div style="text-align: center;">
        <a href="../index.html" class="btn-voltar">⬅ Voltar</a>
    </div>

<script>
    // ==========================================
    // ADICIONE SEUS JOGOS AQUI ABAIXO
    // ==========================================
    const meusJogos = [
        {
            nome: "Cow Evolution",
            imagem: "https://via.placeholder.com/600x400/001f3f/00d4ff?text=Free+Fire",
            descricao: "Versão otimizada com gráficos ultra e melhor desempenho para celulares fracos.",
            link: "cow evolution.html"
        },
        {
            nome: "Apple Champions",
            imagem: "https://via.placeholder.com/600x400/001f3f/00d4ff?text=Minecraft",
            descricao: "O clássico jogo de construção. Versão completa com acesso a servidores.",
            link: "URL_DO_JOGO_2"
        },
        {
            nome: "2048",
            imagem: "https://via.placeholder.com/600x400/001f3f/00d4ff?text=Minecraft",
            descricao: "O clássico jogo de construção. Versão completa com acesso a servidores.",
            link: "URL_DO_JOGO_2"
        }
       
    ];

    // Lógica para carregar os jogos
    const menuJogos = document.getElementById('menuJogos');
    const painelDetalhes = document.getElementById('painelDetalhes');

    function carregarJogo(jogo) {
        painelDetalhes.innerHTML = `
            <img src="${jogo.imagem}" class="detalhe-img">
            <h2 class="detalhe-titulo">${jogo.nome}</h2>
            <p class="detalhe-info">${jogo.descricao}</p>
            <a href="${jogo.link}" class="btn-entrar">Entrar no Jogo</a>
        `;
    }

    meusJogos.forEach((jogo, index) => {
        const btn = document.createElement('button');
        btn.className = 'btn-jogo';
        btn.innerHTML = `🕹️ ${jogo.nome}`;
        
        btn.onclick = () => {
            document.querySelectorAll('.btn-jogo').forEach(b => b.classList.remove('ativo'));
            btn.classList.add('ativo');
            carregarJogo(jogo);
        };

        menuJogos.appendChild(btn);
        if (index === 0) { btn.classList.add('ativo'); carregarJogo(jogo); }
    });
</script>

</body>
</html>
