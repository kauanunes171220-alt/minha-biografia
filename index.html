<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio | Kauã </title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;1,900&display=swap');

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Montserrat', sans-serif;
        background-color: #050a10;
        background-image: radial-gradient(circle at top, #001f3f 0%, #050a10 70%);
        color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    .container {
        width: 100%;
        max-width: 400px;
        background: rgba(10, 20, 35, 0.7);
        padding: 40px 20px;
        border-radius: 25px;
        border: 1px solid #007bff;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        text-align: center;
        backdrop-filter: blur(12px);
    }

    .logo {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 4px solid #00d4ff;
        object-fit: cover;
        animation: pulse-blue 2.5s infinite;
        margin-bottom: 20px;
    }

    @keyframes pulse-blue {
        0% { box-shadow: 0 0 10px rgba(0, 212, 255, 0.3); }
        50% { box-shadow: 0 0 25px rgba(0, 212, 255, 0.7); }
        100% { box-shadow: 0 0 10px rgba(0, 212, 255, 0.3); }
    }

    h1 {
        font-size: 28px;
        font-weight: 900;
        text-transform: uppercase;
        color: #f0faff;
        text-shadow: 0px 0px 15px rgba(0, 123, 255, 0.8);
    }

    p {
        color: #a0c4ff;
        margin: 8px 0 30px;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 1px;
    }

    .links-container {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .link {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        /* Estilo Azul Profundo */
        background: rgba(0, 80, 150, 0.3);
        padding: 16px;
        border-radius: 15px;
        color: #00d4ff;
        text-decoration: none;
        font-weight: 700;
        font-size: 15px;
        text-transform: uppercase;
        transition: all 0.3s ease;
        border: 1px solid #007bff;
    }

    .link:hover {
        background: #007bff;
        color: #ffffff;
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(0, 123, 255, 0.6);
    }

    .footer {
        margin-top: 40px;
        font-size: 11px;
        color: #4a6a8a;
        letter-spacing: 2px;
    }
</style>
</head>
<body>

<div class="container">
    <img class="logo" src="https://raw.githubusercontent.com/kauanunes171220-alt/minha-biografia/refs/heads/main/foto%20de%20perfil.png" alt="Logo">

    <h1>Kauã</h1>
    <p>Acesse meus diretórios abaixo</p>

    <div class="links-container">
        <a class="link" href="jogos.html">
            🕹️ Jogos 🕹️
        </a>

        <a class="link" href="./aplicativos/">
            📱 Aplicativos 📱
        </a>

        <a class="link" href="./redes-sociais/">
            🌐 Redes Sociais 🌐
        </a>
    </div>

    <div class="footer">
        © 2026 Kauã
    </div>
</div>

</body>
</html>
